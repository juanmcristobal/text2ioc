[tox]
envlist = py310, py311, py312, py313, flake8, coverage, benchmark

[testenv:flake8]
basepython = python
deps = flake8
commands = flake8 text2ioc

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
passenv =
    CARGO_HOME
    HOME
    IOC_TLD_CACHE
    PATH
    RUSTUP_HOME
deps =
    -r{toxinidir}/requirements.txt
    coverage
    maturin
    pytest
commands =
    python -m pip install --upgrade pip setuptools wheel maturin
    maturin develop --release
    pytest --basetemp={envtmpdir}

[testenv:coverage]
basepython = python
passenv =
    CARGO_HOME
    HOME
    IOC_TLD_CACHE
    PATH
    RUSTUP_HOME
deps =
    -r{toxinidir}/requirements.txt
    coverage
    maturin
    pytest
commands =
    python -m pip install --upgrade pip setuptools wheel maturin
    maturin develop --release
    coverage run --source text2ioc -m pytest
    coverage report --show-missing --fail-under=95

[testenv:benchmark]
basepython = python
passenv =
    CARGO_HOME
    HOME
    IOC_TLD_CACHE
    PATH
    RUSTUP_HOME
deps =
    -r{toxinidir}/requirements.txt
    maturin
    pytest
commands =
    python -m pip install --upgrade pip setuptools wheel maturin
    maturin develop --release
    python benchmarks/benchmark_extract.py --min-speedup 5
